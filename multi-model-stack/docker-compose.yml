name: class-eu009

# All three model services share /root/.cache/huggingface so a model is only
# downloaded once even if reused across containers.
x-vllm: &vllm
  image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  runtime: nvidia
  ipc: host
  environment:
    NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    HF_HUB_ENABLE_HF_TRANSFER: "1"
    HF_TOKEN: ${HF_TOKEN:-}
    TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-}
  volumes:
    - hf-cache:/root/.cache/huggingface
  restart: unless-stopped

services:
  vllm-llm:
    <<: *vllm
    container_name: class-vllm-llm
    ports:
      - "8001:8001"
    command:
      - --model=${LLM_MODEL:-Qwen/Qwen3-8B}
      - --served-model-name=qwen3.6
      - --host=0.0.0.0
      - --port=8001
      - --gpu-memory-utilization=${LLM_GPU_UTIL:-0.55}
      - --max-model-len=${LLM_MAX_LEN:-32768}
      - --max-num-seqs=${LLM_MAX_SEQS:-32}
      - --enable-chunked-prefill
      - --max-num-batched-tokens=16384
      - --enable-prefix-caching
      - --dtype=auto
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8001/health\", timeout=3); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 80
      start_period: 900s

  vllm-embedding:
    <<: *vllm
    container_name: class-vllm-embedding
    ports:
      - "8002:8002"
    command:
      - --model=${EMBED_MODEL:-Qwen/Qwen3-Embedding-8B}
      - --served-model-name=qwen3-embedding
      - --runner=pooling
      - --convert=embed
      - --host=0.0.0.0
      - --port=8002
      - --gpu-memory-utilization=${EMBED_GPU_UTIL:-0.20}
      - --max-model-len=${EMBED_MAX_LEN:-8192}
      - --max-num-seqs=64
      - --dtype=bfloat16
      - --trust-remote-code
    depends_on:
      vllm-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8002/health\", timeout=3); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 80
      start_period: 600s

  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    runtime: nvidia
    container_name: class-whisper
    ports:
      - "8090:8000"
    volumes:
      - whisper-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      WHISPER__MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
      WHISPER__INFERENCE_DEVICE: "cuda"
      WHISPER__COMPUTE_TYPE: "float16"
      WHISPER__NUM_WORKERS: "2"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
      LOG_LEVEL: "warning"
      DO_NOT_TRACK: "1"
    depends_on:
      vllm-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 300s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: class-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    container_name: class-litellm
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-class-demo}
      LITELLM_LOG: "INFO"
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-sk-class-demo}
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
    command:
      - --config=/app/config.yaml
      - --port=4000
      - --host=0.0.0.0
    depends_on:
      vllm-llm:
        condition: service_healthy
      vllm-embedding:
        condition: service_healthy
      whisper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hf-cache:
  whisper-cache:
  postgres-data:
